<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Transmission 441</title>

  <style>
    body {
      margin: 0;
      background: url('background2.png') no-repeat center center fixed;
      background-size: contain;
      background-color: black;
      color: #00ff00;
      font-family: monospace;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.75);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .terminal {
      width: min(900px, 92vw);
      text-align: left;
      border: 1px solid rgba(0, 255, 0, 0.35);
      border-radius: 12px;
      padding: 18px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
      box-shadow: 0 0 30px rgba(0,255,0,0.08);
    }

    .scanlines:before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        rgba(0,0,0,0) 3px,
        rgba(0,0,0,0) 6px
      );
      mix-blend-mode: overlay;
      opacity: 0.12;
    }

    .glitch {
      position: relative;
      display: inline-block;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 0 0 12px 0;
      font-size: clamp(22px, 3.2vw, 34px);
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
      opacity: 0.8;
    }

    .glitch::before {
      transform: translate(1px, 0);
      clip-path: inset(0 0 65% 0);
      animation: glitchTop 2.8s infinite linear;
    }

    .glitch::after {
      transform: translate(-1px, 0);
      clip-path: inset(45% 0 0 0);
      animation: glitchBottom 2.1s infinite linear;
    }

    @keyframes glitchTop {
      0%, 100% { transform: translate(1px, 0); opacity: 0.55; }
      25% { transform: translate(-2px, 1px); }
      50% { transform: translate(3px, 0); opacity: 0.8; }
      75% { transform: translate(-1px, -1px); }
    }

    @keyframes glitchBottom {
      0%, 100% { transform: translate(-1px, 0); opacity: 0.55; }
      30% { transform: translate(3px, 0); opacity: 0.8; }
      60% { transform: translate(-3px, -1px); }
      90% { transform: translate(2px, -1px); }
    }

    #typed {
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 1rem;
      margin: 0;
    }

    .caret {
      display: inline-block;
      width: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>

<body class="scanlines">
  <div class="overlay">
    <div class="terminal">

      <h1 class="glitch" data-text="EMPIREZ // NODE 441 RESTORED">
        EMPIREZ // NODE 441 RESTORED
      </h1>

      <p id="typed"></p><span class="caret">█</span>

      <!-- The Empire watches from above -->

    </div>
  </div>

  <script>
    const BASE64_COORDS = "MjUxMi4zNyA5MDc5LjUy"; // Your encoded coordinates

    const message = [
      "[LINK] Establishing encrypted uplink...",
      "[OK]  Cipher handshake complete.",
      "",
      "IMPERIAL TRANSMISSION // 441-SHADOW",
      "Signal integrity: 67%",
      "",
      "Only those who listen will find what was buried.",
      "",
      "Coordinates (encoded):",
      BASE64_COORDS,
      "",
      "Repeat at dusk."
    ].join("\n");

    const typedEl = document.getElementById("typed");

    function typeOut(text, speedMs = 22) {
      typedEl.textContent = "";
      let i = 0;
      const interval = setInterval(() => {
        typedEl.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
      }, speedMs);
    }

    typeOut(message);
  </script>

</body>
</html>
